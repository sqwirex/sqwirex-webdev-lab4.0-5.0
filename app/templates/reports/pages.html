
{% extends 'base.html' %}
{% block title %}Отчёт по страницам{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Отчёт по страницам</h1>
<table class="table table-striped table-bordered">
    <thead><tr><th>№</th><th>Страница</th><th>Количество посещений</th></tr></thead>
    <tbody>
        {% for row in rows %}
        <tr><td>{{ loop.index }}</td><td>{{ row['path'] }}</td><td>{{ row['visits_count'] }}</td></tr>
        {% endfor %}
    </tbody>
</table>
<a href="{{ url_for('reports.export_pages_csv') }}" class="btn btn-primary">Экспорт в CSV</a>
{% endblock %}
